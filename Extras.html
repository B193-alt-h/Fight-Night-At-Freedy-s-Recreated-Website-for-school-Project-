<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF 1 - Extras</title>
    <style>
        /* --- Base Setup --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border: 2px solid #111;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        /* --- THE BLIP FLASH OVERLAY (The "Big Flap") --- */
        #blip-flash-overlay {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Screenpart/PC\ _\ Computer\ -\ Five\ Nights\ at\ Freddy\'s\ -\ Miscellaneous\ -\ Blip\ Flash.png'); 
            background-size: 100% 1100%; 
            background-repeat: no-repeat;
            z-index: 100;
            pointer-events: none;
        }

        /* --- Background Setup --- */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Background/xtv8q6ridky11.gif');
            background-color: #111;
            background-size: cover;
            background-position: center;
        }

        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at 17% 32%, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.05) 0.00085px);
            animation: staticAnim 0.1s infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes staticAnim {
            0% { background-position: 0 0; }
            100% { background-position: 10px 10px; }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 11;
            pointer-events: none;
        }

        .content-container {
            position: relative;
            z-index: 30;
            padding: 5%;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
        }

        .screen-title {
            font-size: 3vw;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px #000;
        }

        .extras-layout {
            display: flex;
            flex: 1;
            gap: 40px;
        }

        .extras-nav {
            flex: 1;
            border-right: 2px dashed #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-section-title {
            font-size: 2vw;
            color: #fff;
            margin: 10px 0 5px 0;
            text-decoration: underline;
        }

        .character-title {
            margin-top: 30px;
        }

        .menu-item {
            font-size: 1.8vw;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .menu-item:hover { color: #fff; }
        .menu-item.active { color: #fff; }

        .cursor {
            opacity: 0; 
            margin-right: 15px;
            font-weight: bold;
            color: #fff;
        }

        .menu-item.active .cursor { opacity: 1; }

        .extras-viewer {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 1px solid #111;
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 30px #000;
            overflow: hidden;
        }

        #gallery-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            display: block;
            clip-path: inset(3px 0 0 0);
        }

        #jumpscare-container {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #jumpscare-sprite-viewer {
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center top;
            display: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transform: scale(1.08); 
        }

        #jumpscare-placeholder {
            font-size: 1.5vw;
            color: #555;
            text-align: center;
        }

        #play-jumpscare-btn {
            position: absolute;
            bottom: 20px;
            padding: 10px 20px;
            font-family: 'Consolas', Courier, monospace;
            font-size: 1.5vw;
            background-color: #8b0000;
            color: white;
            border: 2px solid #ff5555;
            cursor: pointer;
            text-transform: uppercase;
            z-index: 50;
            transition: transform 0.1s;
        }

        #play-jumpscare-btn:active {
            transform: scale(0.95);
        }

        .back-btn {
            margin-top: 20px;
            border: 0;
            background: transparent;
            color: white;
            font-family: inherit;
            font-size: 2vw;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            display: inline-block;
            text-align: left;
            width: fit-content;
        }

        .back-btn:hover,
        .back-btn:focus-visible {
            opacity: 1;
            text-shadow: 0 0 10px white;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Overlay for transitions -->
        <div id="blip-flash-overlay"></div>

        <div id="menu-screen">
            <div class="static-overlay"></div>
            <div class="scanlines"></div>

            <div class="content-container">
                <div class="screen-title">Extras</div>
                
                <div class="extras-layout">
                    <div class="extras-nav">
                        <div class="nav-section-title">Mode</div>
                        <div class="menu-item active" id="mode-gallery" onclick="setMode('gallery')">
                            <span class="cursor">&gt;&gt;</span> Animatronics
                        </div>
                        <div class="menu-item" id="mode-jumpscare" onclick="setMode('jumpscare')">
                            <span class="cursor">&gt;&gt;</span> Jumpscares
                        </div>

                        <div class="nav-section-title character-title">Character</div>
                        <div class="menu-item active" id="char-freddy" onclick="setCharacter('freddy')">
                            <span class="cursor">&gt;&gt;</span> Freddy Fazbear
                        </div>
                        <div class="menu-item" id="char-bonnie" onclick="setCharacter('bonnie')">
                            <span class="cursor">&gt;&gt;</span> Bonnie
                        </div>
                        <div class="menu-item" id="char-chica" onclick="setCharacter('chica')">
                            <span class="cursor">&gt;&gt;</span> Chica
                        </div>
                        <div class="menu-item" id="char-foxy" onclick="setCharacter('foxy')">
                            <span class="cursor">&gt;&gt;</span> Foxy
                        </div>
                    </div>

                    <div class="extras-viewer">
                        <img id="gallery-image" src="Jumpscare/Freedy_Jumpscare.png" alt="Freddy Fazbear preview">

                        <div id="jumpscare-container">
                            <div id="jumpscare-placeholder">Ready to strike...</div>
                            <div id="jumpscare-sprite-viewer"></div>
                            <button id="play-jumpscare-btn" onclick="triggerJumpscare()">Play Jumpscare</button>
                        </div>
                    </div>
                </div>

                <!-- Back button now triggers the glitch transition -->
                <button class="back-btn" type="button" onclick="exitWithGlitch('Entrance.html')">&lt;&lt; Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'gallery';
        let currentChar = 'freddy';
        let isJumpscarePlaying = false;
        let jumpscareSpeed = 45; 

        const database = {
            freddy: {
                gallery: 'Jumpscare/Freedy_Jumpscare.png',
                jumpscare: 'Jumpscare/Freedy_Jumpscare.png',
                frames: 21
            },
            bonnie: {
                gallery: 'Jumpscare/bonnie_jumpscare.png',
                jumpscare: 'Jumpscare/bonnie_jumpscare.png', 
                frames: 11 
            },
            chica: {
                gallery: 'Jumpscare/Chica_jumpscare.png',
                jumpscare: 'Jumpscare/Chica_jumpscare.png', 
                frames: 16
            },
            foxy: {
                gallery: 'Jumpscare/Foxy_Jumpscare.png',
                jumpscare: 'Jumpscare/Foxy_Jumpscare.png',
                frames: 21
            }
        };

        // Trigger glitch on load
        window.addEventListener('load', function() {
            playBlipFlash(600); 
        });

        // Handle the "Back to Menu" button with a glitch
        function exitWithGlitch(target) {
            playBlipFlash(500, function() {
                window.location.href = target;
            });
        }

        // Logic for the Glitch Flash (The "Big Flap")
        function playBlipFlash(duration, callback) {
            const flashOverlay = document.getElementById('blip-flash-overlay');
            if (!flashOverlay) {
                if (callback) callback();
                return;
            }
            flashOverlay.style.display = 'block';
            
            const blipInterval = setInterval(() => {
                // Randomly pick a frame, skipping the bottom green line frame
                const randomFrame = Math.floor(Math.random() * 10);
                flashOverlay.style.backgroundPosition = `0% ${randomFrame * 10}%`;
            }, 30);
            
            setTimeout(() => {
                clearInterval(blipInterval);
                if (!callback) flashOverlay.style.display = 'none';
                if (callback) callback();
            }, duration);
        }

        function setMode(mode) {
            if (isJumpscarePlaying) return; 
            currentMode = mode;
            document.getElementById('mode-gallery').classList.remove('active');
            document.getElementById('mode-jumpscare').classList.remove('active');
            document.getElementById(`mode-${mode}`).classList.add('active');

            if (mode === 'gallery') {
                document.getElementById('gallery-image').style.display = 'block';
                document.getElementById('jumpscare-container').style.display = 'none';
            } else {
                document.getElementById('gallery-image').style.display = 'none';
                document.getElementById('jumpscare-container').style.display = 'flex';
                document.getElementById('jumpscare-sprite-viewer').style.display = 'none';
                document.getElementById('jumpscare-placeholder').style.display = 'block';
                document.getElementById('play-jumpscare-btn').style.display = 'block';
            }
        }

        function setCharacter(character) {
            if (isJumpscarePlaying) return; 
            currentChar = character;
            ['freddy', 'bonnie', 'chica', 'foxy'].forEach(char => {
                document.getElementById(`char-${char}`).classList.remove('active');
            });
            document.getElementById(`char-${character}`).classList.add('active');
            document.getElementById('gallery-image').src = database[character].gallery;
            document.getElementById('gallery-image').alt = `${character} preview`;
            
            const viewer = document.getElementById('jumpscare-sprite-viewer');
            const charData = database[character];
            
            viewer.style.backgroundImage = `url('${charData.jumpscare}')`;
            viewer.style.backgroundSize = `100% ${charData.frames * 100}%`;
            viewer.style.display = 'none';
            
            document.getElementById('jumpscare-placeholder').style.display = 'block';
            document.getElementById('play-jumpscare-btn').style.display = 'block';
        }

        function triggerJumpscare() {
        if (isJumpscarePlaying) return;
        isJumpscarePlaying = true;
        
        const viewer = document.getElementById('jumpscare-sprite-viewer');
        const placeholder = document.getElementById('jumpscare-placeholder');
        const btn = document.getElementById('play-jumpscare-btn');
        const charData = database[currentChar];
        
        placeholder.style.display = 'none';
        btn.style.display = 'none'; 
        viewer.style.display = 'block';

        let currentFrame = 0;
        
        const jumpInterval = setInterval(() => {
            if (charData.frames <= 1) {
               viewer.style.backgroundPosition = `0% 0%`;
            } else {
                const pos = (currentFrame / (charData.frames - 1)) * 100;
                viewer.style.backgroundPosition = `0% ${pos}%`;
            }
            
            currentFrame++;

            if (currentFrame >= charData.frames) {
                clearInterval(jumpInterval);
                
                // EXTENDED HOLD: We hold the final frame for 800ms before resetting
                // This makes the jumpscare feel more like the actual game
                setTimeout(() => {
                    viewer.style.display = 'none';
                    placeholder.style.display = 'block';
                    btn.style.display = 'block';
                    isJumpscarePlaying = false;
                    // Reset background position for next time
                    viewer.style.backgroundPosition = `0% 0%`;
                }, 800); 
            }
        }, jumpscareSpeed);
    }
    </script>
</body>
</html>

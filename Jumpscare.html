<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF Jumpscare Test</title>
    <style>
        /* --- Base Office Setup --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Prevents scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #222;
            border: 2px solid #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Just a fake office background to set the mood */
        #office-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #333 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 24px;
        }

        /* --- The Button --- */
        #trigger-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: darkred;
            color: white;
            border: 2px solid red;
            cursor: pointer;
            z-index: 10;
            border-radius: 5px;
            transition: 0.2s;
        }

        #trigger-btn:hover {
            background-color: red;
            box-shadow: 0 0 15px red;
        }

        /* --- THE JUMPSCARE SCREEN --- */
        #jumpscare-screen {
            display: none; /* Hidden until triggered */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* Set to 4:3 aspect ratio roughly matching Bonnie's frame */
            width: 80%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            
            /* * IMPORTANT: PUT YOUR IMAGE PATH HERE 
             * Replace the linear-gradient with your own sprite sheet if needed.
             */
            background-image: repeating-linear-gradient(
                0deg,
                #440000 0%, #ff0000 5%, #000000 9%, #440000 10%
            ); 
            
            background-repeat: no-repeat;
            
            /* * THE MAGIC TRICK: 
             * Because there are 11 frames, we make the background height 1100%.
             * This makes 1 frame exactly 100% of the container's height!
             */
            background-image: url('Jumpscare/bonnie_jumpscare.png');
            background-size: 100% 1100%; 
            background-position: 0% 0%; /* Start at the top frame */
            
            z-index: 100; /* Pops up over everything */
        }

        /* Static/Game Over Overlay */
        #static-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at 17% 32%, white, black 0.00085px);
            animation: staticAnim 0.2s infinite;
            z-index: 200;
            opacity: 0.8;
        }

        @keyframes staticAnim {
            0% { background-position: 0 0; }
            100% { background-position: 10px 10px; }
        }

        #game-over-text {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 10px red;
            z-index: 201;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="office-bg">
            [ Office Background Image Goes Here ]
        </div>

        <button id="trigger-btn" onclick="startJumpscare()">Trigger Bonnie Jumpscare</button>

        <!-- The Jumpscare Container -->
        <div id="jumpscare-screen"></div>

        <!-- Game Over / Static -->
        <div id="static-screen"></div>
        <div id="game-over-text">GAME OVER</div>
    </div>

    <script>
        const totalFrames = 11; // 11 frames in your Bonnie image
        const animationSpeed = 40; // Milliseconds per frame (lower = faster)
        
        // Calculate the percentage to move for each frame
        // Formula: 100 / (totalFrames - 1)
        const stepPercentage = 100 / (totalFrames - 1); 

        function startJumpscare() {
            const jumpscareDiv = document.getElementById('jumpscare-screen');
            const triggerBtn = document.getElementById('trigger-btn');
            
            // 1. Hide the button and show the jumpscare screen
            triggerBtn.style.display = 'none';
            jumpscareDiv.style.display = 'block';

            // Optional: Play sound here
            // let scream = new Audio('sounds/scream.mp3');
            // scream.play();

            let currentFrame = 0;

            // 2. Start the flipbook interval
            const jumpscareInterval = setInterval(() => {
                currentFrame++;

                if (currentFrame >= totalFrames) {
                    // Animation finished!
                    clearInterval(jumpscareInterval);
                    triggerGameOver();
                } else {
                    // Move the background image up by calculating the percentage
                    const yPosition = currentFrame * stepPercentage;
                    jumpscareDiv.style.backgroundPosition = `0% ${yPosition}%`;
                }
            }, animationSpeed);
        }

        function triggerGameOver() {
            // Hide the jumpscare and show static
            document.getElementById('jumpscare-screen').style.display = 'none';
            document.getElementById('static-screen').style.display = 'block';
            
            // Show "GAME OVER" after 1 second of static
            setTimeout(() => {
                document.getElementById('game-over-text').style.display = 'block';
            }, 1000);
        }
    </script>
</body>
</html>
